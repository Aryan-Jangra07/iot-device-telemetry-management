openapi: 3.0.0
info:
  title: IoT Device API
  version: 1.0.0
  description: API for storing IoT device data

servers:
  - url: http://localhost:5000

paths:
  /api/device:
    post:
      summary: Save device data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
                temperature:
                  type: number
                status:
                  type: string
      responses:
        "201":
          description: Device data saved successfully